<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Bubble Sniper - Correction</title>
  <link href="css/style.css" rel="stylesheet">
  <script src="js/app.js" type="module"></script>

</head>
<body>
<div class="game-container">
  <h1>Bubble Sniper</h1>
  <div class="game-info">
    <div class="timer">Temps: <span id="time">30</span>s</div>
    <div class="score">Score: <span id="score">0</span></div>
  </div>
  <div class="game-area" id="gameArea">
    <!-- Le cadre de jeu s'affichera ici -->
  </div>
  <button id="ajoutBubble">Ajouter</button>
  <div id="finalPanel" class="hidden">
    <div class="final-content">
      <h2>Temps écoulé</h2>
      <p>Votre score final: <span id="finalScore">0</span></p>
      <button id="restartBtn">New Game</button>
    </div>
  </div>
</div>
</body>
</html>
